name: CI Guards

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guard-and-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Duplicate file guard
        run: python scripts/check_no_duplicates.py

      - name: Import smoke
        run: python scripts/import_smoke.py

      - name: LP regression tests
        run: pytest -q formula/tests/test_lp_regression.py
